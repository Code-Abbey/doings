services:
  - type: web
    name: doings-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_INVITE_TOKEN
        sync: false
      - key: CLIENT_URL
        value: https://code-abbey.github.io
